<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
    }

    /* HERO */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: right center;
    }

    /* ① 네비게이션 */
    .nav {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: center;
      gap: 40px;
      z-index: 3;
      color: white;
      font-size: 14px;
    }

    .nav a {
      text-decoration: none;
      color: white;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 1;
    }

    /* ② 중앙 텍스트 */
    .hero-text {
      position: absolute;
      left: 10%;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      z-index: 2;
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      margin: 0;
    }

    .hero-text p {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.8;
    }

    /* 어둡게 */
    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0,0,0,0.3);
    }
  </style>

</head>

<body>

<section class="hero">

  <img src="./hero.jpg" class="hero-img">

  <!-- ① NAV -->
  <div class="nav">
    <a href="#">Work</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <!-- ② TEXT -->
  <div class="hero-text">
    <h1>Taeyeoun Park</h1>
    <p>FX Artist / Digital Effects</p>
  </div>

</section>

</body>
</html>

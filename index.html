<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: right center;
    }

    .hero-text {
      position: absolute;
      left: 10%;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      z-index: 2;
    }

    .hero-text h1 {
      font-size: 48px;
      margin: 0;
    }

    .hero-text p {
      font-size: 20px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.3);
    }
  </style>

</head>

<body>

<section class="hero">
  <img src="hero.jpg" class="hero-img">

  <div class="hero-text">
    <h1>Taeyeoun Park</h1>
    <p>FX Artist / Digital Effects</p>
  </div>
</section>

</body>
</html>

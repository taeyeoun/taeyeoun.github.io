<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taeyeoun Park</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* HERO SECTION */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100vh;
  padding: 0 8%;
}

/* LEFT TEXT */
.text {
  max-width: 40%;
  z-index: 2;
}

.text h1 {
  font-size: 64px;
  font-weight: bold;
  margin-bottom: 10px;
}

.text p {
  font-size: 20px;
  opacity: 0.7;
}

/* RIGHT IMAGE */
.image {
  position: relative;
  width: 55%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.image img {
  width: 100%;
  max-width: 700px;
  object-fit: cover;
}

/* LEFT DARK GRADIENT (텍스트 가독성용) */
.gradient {
  position: absolute;
  left: 0;
  top: 0;
  width: 60%;
  height: 100%;
  background: linear-gradient(to right, black 60%, transparent);
  z-index: 1;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .hero {
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }

  .text {
    max-width: 100%;
    margin-bottom: 20px;
  }

  .image {
    width: 100%;
    justify-content: center;
  }

  .gradient {
    display: none;
  }
}
</style>
</head>

<body>

<div class="hero">

  <!-- LEFT TEXT -->
  <div class="text">
    <h1>Taeyeoun Park</h1>
    <p>FX Artist | Houdini | Simulation</p>
  </div>

  <!-- RIGHT IMAGE -->
  <div class="image">
    <img src="Group 1.jpg" alt="hero image">
  </div>

  <!-- GRADIENT -->
  <div class="gradient"></div>

</div>

</body>
</html>
